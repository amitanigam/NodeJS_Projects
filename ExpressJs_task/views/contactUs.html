<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact US</title>
    <link rel="stylesheet" href="/public/output.css">

</head>

<body>

    <nav class="bg-red-500 py-3 shadow-md">
        <div class="max-w-5xl mx-auto flex items-center gap-8 px-4">
            <a href="/" class="text-white font-medium hover:underline">Go to Home</a>
            <a href="/contact-us" class="text-white font-medium hover:underline">Contact Us</a>
        </div>
    </nav>

    <main class="max-w-md mx-auto bg-white shadow-lg rounded-xl p-6 mt-10 border border-gray-200">
        <form action="/contact-us" method="POST" class="space-y-4">

            <input type="text" id="name" name="name" placeholder="Enter your Name"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" />

            <input type="email" id="email" name="email" placeholder="Enter your Email"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" />

            <input type="submit" id="submitBtn" value="Submit"
                class="w-full bg-blue-600 text-white py-2 rounded-lg cursor-pointer hover:bg-blue-700 transition" />

        </form>
    </main>


    <script>

        console.log(document.getElementById('submitBtn'));
        let submitBtn = document.getElementById('submitBtn');
        let name = document.getElementById('name');
        let email = document.getElementById('email');

        submitBtn.addEventListener('click', (e) => {


            if (name.value.trim() === "") {
                e.preventDefault()
                alert('Please fill your name!')
                name.focus();
                return
            } else if (email.value.trim() === '') {
                e.preventDefault()
                alert('Please fill your email!')
                email.focus();
                return
            }

        })


    </script>

</body>

</html>
